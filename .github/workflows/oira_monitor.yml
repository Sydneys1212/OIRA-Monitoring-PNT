name: OIRA Rule Status Monitor

on:
  schedule:
    # 4x daily — 8am, 12pm, 4pm, 8pm Eastern (UTC offsets vary; using EST UTC-5 as base)
    - cron: "0 13 * * *"   # 8am ET  (UTC 13:00)
    - cron: "0 17 * * *"   # 12pm ET (UTC 17:00)
    - cron: "0 21 * * *"   # 4pm ET  (UTC 21:00)
    - cron: "0 1 * * *"    # 8pm ET  (UTC 01:00 next day)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run OIRA monitor
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python oira_monitor.py

      - name: Commit and push updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status_state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: update status_state.json [skip ci]"
            git push
          fi
